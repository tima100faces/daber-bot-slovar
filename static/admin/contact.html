<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daber Dict · Сообщения</title>
<link rel="stylesheet" href="/static/fonts.css?v=1">
<link rel="stylesheet" href="/static/design-system.css">
<link rel="stylesheet" href="/admin/static/_admin.css?v=4">
</head>
<body class="admin-body">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" style="display:flex;align-items:center;text-decoration:none"><span class="logo-img"></span><img src="/daber-logo.svg" class="logo-fallback" alt="Daber"></a>
    <span class="admin-label">Admin</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/pending" class="nav-item"><img src="/static/icons/list-check.svg" class="nav-icon" alt="">Очередь<span class="nav-badge" id="count-pending">0</span></a>
    <a href="/admin/approved" class="nav-item"><img src="/static/icons/circle-check.svg" class="nav-icon" alt="">Одобрено<span class="nav-badge" id="count-approved">0</span></a>
    <a href="/admin/rejected" class="nav-item"><img src="/static/icons/circle-x.svg" class="nav-icon" alt="">Отклонено<span class="nav-badge" id="count-rejected">0</span></a>
    <a href="/admin/feedback" class="nav-item"><img src="/static/icons/message-report.svg" class="nav-icon" alt="">Жалобы<span class="nav-badge" id="count-feedback">0</span></a>
    <a href="/admin/contact" class="nav-item active"><img src="/static/icons/scale.svg" class="nav-icon" alt="">Сообщения<span class="nav-badge" id="count-contact">0</span></a>
    <a href="/admin/verify" class="nav-item"><img src="/static/icons/search.svg" class="nav-icon" alt="">Верификация<span class="nav-badge" id="count-verify">0</span></a>
    <a href="/admin/words" class="nav-item"><img src="/static/icons/books.svg" class="nav-icon" alt="">Словарь</a>
    <a href="/admin/costs" class="nav-item"><img src="/static/icons/coins.svg" class="nav-icon" alt="">Затраты</a>
    <a href="/admin/facts" class="nav-item"><img src="/static/icons/dice-6.svg" class="nav-icon" alt="">Факты</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item logout-item" onclick="logout()"><img src="/static/icons/logout.svg" class="nav-icon" alt="">Выйти</button>
  </div>
</aside>

<div class="main-area">
  <header class="topbar">
    <button class="burger" onclick="toggleSidebar()"><img src="/static/icons/menu-2.svg" class="nav-icon" alt=""></button>
    <h1>Сообщения</h1>
  </header>
  <main class="content" id="content"><div class="spinner">Загрузка...</div></main>
</div>

<script src="/admin/static/_core.js"></script>
<script>
async function loadMessages() {
  const res = await fetch('/admin/api/contact');
  if (res.status === 401) { window.location.href = '/admin/login'; return; }
  const items = await res.json();
  document.getElementById('count-contact').textContent = items.filter(i => !i.resolved).length;
  const content = document.getElementById('content');
  if (!items.length) { content.innerHTML = '<div class="empty">Нет сообщений</div>'; return; }
  content.innerHTML = items.map(m => {
    let contactHtml = '';
    if (m.contact) {
      const isEmail = m.contact.includes('@');
      if (isEmail) contactHtml = `<a href="mailto:${m.contact}" class="fb-meta">${m.contact}</a>`;
      else contactHtml = `<span class="fb-meta">${m.contact}</span>`;
    }
    return `<div class="fb-card">
    <div class="fb-head">
      <span class="fb-word">${m.subject}</span>
      <button class="fb-toggle" onclick="toggleMsg(${m.id})" id="msg-btn-${m.id}">${m.resolved ? 'решено' : 'не решено'}</button>
    </div>
    <div class="fb-comment">${m.message.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    <div class="fb-meta">${contactHtml}${m.contact ? ' · ' : ''}${new Date(m.created_at).toLocaleString('ru')}</div>
  </div>`;
  }).join('');
}
async function toggleMsg(id) {
  const res = await fetch('/admin/api/contact/' + id + '/toggle', { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    const btn = document.getElementById('msg-btn-' + id);
    btn.textContent = data.resolved ? 'решено' : 'не решено';
    loadMessages();
  }
}
function onPageLoad() { loadMessages(); }
</script>
</body>
</html>
