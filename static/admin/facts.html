<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daber Dict · Факты</title>
<link rel="stylesheet" href="/static/fonts.css?v=1">
<link rel="stylesheet" href="/static/design-system.css?v=2">
<link rel="stylesheet" href="/static/admin/_admin.css?v=4">
<style>
.pending-card {
  background: var(--color-surface);
  border: 1px solid var(--color-rule);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
}
.pending-card__header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: var(--space-sm);
}
.pending-card__title {
  font-size: 1.1rem; font-weight: 700; margin-bottom: var(--space-sm);
  color: var(--color-ink);
}
.pending-card__body {
  font-size: 0.9rem; color: var(--color-muted); line-height: 1.55;
  margin-bottom: var(--space-sm);
}
.pending-card__meta {
  display: flex; flex-wrap: wrap; gap: var(--space-md);
  font-size: 0.8rem; color: var(--color-neutral);
}
.filter-bar {
  display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap;
  margin-bottom: var(--space-lg); padding-bottom: var(--space-md);
  border-bottom: 1px solid var(--color-rule);
}
.filter-bar label { font-size: 0.8rem; color: var(--color-muted); }
</style>
</head>
<body class="admin-body">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" style="display:flex;align-items:center;text-decoration:none"><span class="logo-img"></span><img src="/daber-logo.svg" class="logo-fallback" alt="Daber"></a>
    <span class="admin-label">Admin</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/pending" class="nav-item"><img src="/static/icons/list-check.svg" class="nav-icon" alt="">Очередь<span class="nav-badge" id="count-pending">0</span></a>
    <a href="/admin/approved" class="nav-item"><img src="/static/icons/circle-check.svg" class="nav-icon" alt="">Одобрено<span class="nav-badge" id="count-approved">0</span></a>
    <a href="/admin/rejected" class="nav-item"><img src="/static/icons/circle-x.svg" class="nav-icon" alt="">Отклонено<span class="nav-badge" id="count-rejected">0</span></a>
    <a href="/admin/feedback" class="nav-item"><img src="/static/icons/message-report.svg" class="nav-icon" alt="">Жалобы<span class="nav-badge" id="count-feedback">0</span></a>
    <a href="/admin/contact" class="nav-item"><img src="/static/icons/scale.svg" class="nav-icon" alt="">Сообщения<span class="nav-badge" id="count-contact">0</span></a>
    <a href="/admin/verify" class="nav-item"><img src="/static/icons/search.svg" class="nav-icon" alt="">Верификация<span class="nav-badge" id="count-verify">0</span></a>
    <a href="/admin/duplicates" class="nav-item"><img src="/static/icons/circle-x.svg" class="nav-icon" alt="">Дубликаты<span class="nav-badge" id="count-duplicates">0</span></a>
    <a href="/admin/words" class="nav-item"><img src="/static/icons/books.svg" class="nav-icon" alt="">Словарь</a>
    <a href="/admin/costs" class="nav-item"><img src="/static/icons/coins.svg" class="nav-icon" alt="">Затраты</a>
    <a href="/admin/facts" class="nav-item active"><img src="/static/icons/dice-6.svg" class="nav-icon" alt="">Факты</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item logout-item" onclick="logout()"><img src="/static/icons/logout.svg" class="nav-icon" alt="">Выйти</button>
  </div>
</aside>

<div class="main-area">
  <header class="topbar">
    <button class="burger" onclick="toggleSidebar()"><img src="/static/icons/menu-2.svg" class="nav-icon" alt=""></button>
    <h1>Факты об иврите</h1>
    <button class="btn btn--accent" id="generateBtn" onclick="generateFacts()" style="margin-left:auto">Сгенерировать ещё</button>
  </header>
  <main class="content" id="content">
    <div id="statusMsg" style="display:none;padding:0.5rem 1rem;border-radius:6px;margin-bottom:1rem;font-weight:600"></div>

    <div class="filter-bar">
      <label>Показать:</label>
      <button class="mode-btn active" data-filter="all" onclick="setFilter('all', this)">Все</button>
      <button class="mode-btn" data-filter="published" onclick="setFilter('published', this)">Опубликованные</button>
      <button class="mode-btn" data-filter="unpublished" onclick="setFilter('unpublished', this)">Черновики</button>
      <span style="margin-left:auto;font-size:0.75rem;color:var(--color-muted)" id="counter"></span>
    </div>

    <div id="factsList"><div class="spinner">Загрузка...</div></div>
  </main>
</div>

<script src="/admin/static/_core.js"></script>
<script>
const TYPE_LABELS = { did_you_know: 'А вы знали?', story: 'История', etymology: 'Этимология', comparison: 'Сравнение' };

let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadFacts();
}

async function loadFacts() {
  try {
    const res = await fetch(`/admin/api/facts?filter=${currentFilter}&sort=newest`);
    if (res.status === 401) { window.location.href = '/admin/login'; return; }
    const facts = await res.json();
    renderFacts(facts);
  } catch (e) {
    document.getElementById('factsList').innerHTML = '<div class="card-muted">Ошибка загрузки</div>';
  }
}

function renderFacts(facts) {
  const list = document.getElementById('factsList');
  document.getElementById('counter').textContent = `Найдено: ${facts.length}`;

  if (!facts.length) {
    list.innerHTML = '<div class="card-muted">Нет фактов. Нажмите «Сгенерировать».</div>';
    return;
  }
  list.innerHTML = facts.map(f => {
    const pubDate = f.published_at ? new Date(f.published_at) : null;
    const createDate = f.created_at ? new Date(f.created_at) : null;
    const dateStr = pubDate
      ? `Опубл: ${pubDate.toLocaleDateString('ru')}`
      : (createDate ? `Создан: ${createDate.toLocaleDateString('ru')}` : '');

    return `
    <div class="pending-card">
      <div class="pending-card__header">
        <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-accent)">${TYPE_LABELS[f.fact_type] || f.fact_type}</span>
        <span style="font-size:0.75rem;color:var(--color-neutral)">#${f.id}</span>
      </div>
      <div class="pending-card__title">${esc(f.title)}</div>
      <div class="pending-card__body">${esc(f.fact_body)}</div>
      <div class="pending-card__meta">
        <span>${dateStr}</span>
        ${f.source_url ? `<a href="${escAttr(f.source_url)}" target="_blank" style="color:var(--color-accent)">источник</a>` : ''}
        <span style="color:${f.is_published ? 'var(--color-green)' : 'var(--color-orange)'}">${f.is_published ? 'Опубликовано' : 'Черновик'}</span>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:var(--space-sm)">
        <button class="btn btn--sm" onclick="togglePublish(${f.id}, ${!f.is_published})">${f.is_published ? 'Снять с публикации' : 'Опубликовать'}</button>
        <button class="btn btn--sm btn--danger" onclick="deleteFact(${f.id})">Удалить</button>
      </div>
    </div>`;
  }).join('');
}

async function togglePublish(id, publish) {
  await fetch(`/admin/api/facts/${id}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({is_published: publish})
  });
  loadFacts();
}

async function deleteFact(id) {
  if (!confirm('Удалить факт #' + id + '?')) return;
  await fetch(`/admin/api/facts/${id}`, {method: 'DELETE'});
  loadFacts();
}

async function generateFacts() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = 'Генерирую...';
  showStatus('Запущена генерация через Claude Sonnet...', 'info');
  try {
    const res = await fetch('/admin/api/enrichment/generate-facts', {method: 'POST'});
    const data = await res.json();
    showStatus(data.message || 'Готово!', data.status === 'ok' ? 'ok' : 'error');
    loadFacts();
  } catch (e) {
    showStatus('Ошибка', 'error');
  }
  btn.disabled = false; btn.textContent = 'Сгенерировать ещё';
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.style.display = 'block'; el.textContent = msg;
  el.style.background = type === 'ok' ? 'var(--color-green)' : type === 'error' ? 'var(--color-red)' : 'var(--color-accent-dim)';
  el.style.color = '#fff';
  setTimeout(() => el.style.display = 'none', 5000);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

loadFacts();
</script>
</body>
</html>
