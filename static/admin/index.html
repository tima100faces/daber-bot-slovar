<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daber Dict — Admin</title>
<link rel="stylesheet" href="/static/fonts.css?v=1">
<link rel="stylesheet" href="/static/design-system.css">
<style>
  .admin-body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    background: var(--color-paper);
    color: var(--color-ink);
    font-family: var(--font-body);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: var(--color-surface);
    border-right: 1px solid var(--color-rule);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100dvh;
    overflow-y: auto;
    z-index: 20;
  }
  .sidebar-logo {
    padding: var(--space-md) var(--space-lg);
    border-bottom: 1px solid var(--color-rule);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }
  .sidebar-logo svg { height: 26px; color: var(--color-ink); }
  .sidebar-logo .admin-label {
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sidebar-nav {
    flex: 1;
    padding: var(--space-sm);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-footer {
    padding: var(--space-sm);
    border-top: 1px solid var(--color-rule);
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: 10px 12px;
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--color-muted);
    font-size: 0.875rem;
    font-family: var(--font-body);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }
  .nav-item:hover { background: var(--color-surface-2); color: var(--color-ink); }
  .nav-item.active { background: var(--color-accent); color: #fff; }
  .nav-item .nav-icon { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; filter: invert(1); vertical-align: middle; }
  /* Burger + topbar icons also need invert on dark admin */
  .burger .nav-icon, .topbar .nav-icon, .sidebar-logo .nav-icon { filter: invert(1); vertical-align: middle; }
  .nav-item.active .nav-icon { opacity: 1; filter: brightness(0) invert(1); }
  .nav-item .nav-badge {
    margin-left: auto;
    background: var(--color-surface-2);
    color: var(--color-muted);
    border-radius: var(--radius-pill);
    padding: 1px 8px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.2); color: #fff; }
  .nav-item.logout-item { color: var(--color-muted); }
  .nav-item.logout-item:hover { color: var(--color-red); background: rgba(229,62,62,0.1); }

  /* ── Main Area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .topbar {
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 var(--space-lg);
    border-bottom: 1px solid var(--color-rule);
    background: var(--color-surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    color: var(--color-ink);
  }
  .burger {
    display: none;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--color-ink);
    margin-right: var(--space-sm);
    border-radius: var(--radius-md);
  }
  .burger:hover { background: var(--color-surface-2); }
  .burger .nav-icon { width: 22px; height: 22px; }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 19;
  }
  .sidebar-overlay.show { display: block; }

  .content {
    flex: 1;
    padding: var(--space-xl);
    max-width: 900px;
    width: 100%;
    box-sizing: border-box;
  }
  .empty {
    color: var(--color-muted);
    text-align: center;
    padding: var(--space-3xl) var(--space-lg);
    font-size: 0.9375rem;
    line-height: 1.7;
  }

  /* ── Pending / History cards ── */
  .pw-card {
    background: var(--color-surface);
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    transition: opacity 0.3s;
  }
  .pw-card .head {
    display: flex;
    align-items: baseline;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
    flex-wrap: wrap;
  }
  .pw-card .hebrew {
    font-family: var(--font-hebrew);
    font-size: 1.35rem;
    color: var(--color-ink);
    direction: rtl;
  }
  .pw-card .nikud {
    font-size: 1rem;
    color: var(--color-ink);
    direction: rtl;
  }
  .pw-card .translit {
    color: var(--color-accent);
    font-size: 0.9375rem;
  }
  .badge {
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    display: inline-block;
    font-weight: 500;
    margin-left: 8px;
  }
  .badge-red { background: #e53e3e; color: #fff; }
  .badge-green { background: #38a169; color: #fff; }
  .badge-pos {
    background: var(--color-surface-2);
    color: var(--color-muted);
  }
  .badge-approved {
    background: var(--color-green);
    color: oklch(12% 0.008 270);
  }
  .badge-rejected {
    background: var(--color-red-dim, rgba(255,80,80,0.15));
    color: var(--color-red, #ff5050);
  }
  .badge-duplicate {
    background: var(--color-yellow-dim, rgba(255,180,40,0.15));
    color: var(--color-yellow, #e6a800);
    font-size: 0.7rem;
  }
  .pw-card .translation {
    color: var(--color-ink);
    font-size: 0.9375rem;
    margin-bottom: var(--space-sm);
  }
  .pw-card .meta {
    font-size: 0.75rem;
    color: var(--color-muted);
    margin-bottom: var(--space-sm);
  }
  .examples-list {
    margin: var(--space-sm) 0;
    padding: 0;
    list-style: none;
  }
  .examples-list li {
    font-size: 0.8125rem;
    color: var(--color-muted);
    padding: 2px 0;
  }
  .examples-list li .he {
    direction: rtl;
    display: inline;
    color: var(--color-ink);
  }
  .actions {
    display: flex;
    gap: var(--space-sm);
    margin-top: var(--space-md);
  }
  .btn-approve, .btn-reject, .btn-preview, .btn-check {
    padding: 8px 20px;
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn-approve { background: var(--color-green); color: oklch(12% 0.008 270); }
  .btn-approve:hover { opacity: 0.85; }
  .btn-reject { background: var(--color-surface-2); color: var(--color-muted); border: 1px solid var(--color-rule); }
  .btn-reject:hover { background: var(--color-red); color: #fff; border-color: var(--color-red); }
  .btn-preview {
    background: var(--color-surface-2);
    color: var(--color-muted);
    padding: 8px 14px;
    font-size: 1rem;
    border: 1px solid var(--color-rule);
  }
  .btn-preview:hover { color: var(--color-accent); border-color: var(--color-accent); }
  .btn-edit {
    background: var(--color-surface-2);
    color: var(--color-accent);
    padding: 8px 14px;
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-edit:hover { background: var(--color-accent); color: #fff; }
  .edit-form {
    margin-top: var(--space-md);
    padding: var(--space-md);
    background: var(--color-surface-2);
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-md);
    display: none;
  }
  .edit-form.open { display: block; }
  .edit-form label {
    display: block;
    font-size: 0.75rem;
    color: var(--color-muted);
    margin: 6px 0 2px;
  }
  .edit-form input, .edit-form textarea, .edit-form select {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-ink);
    font-family: var(--font-body);
    font-size: 0.85rem;
    box-sizing: border-box;
  }
  .edit-form textarea { min-height: 60px; resize: vertical; }
  .edit-form .edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 4px 0;
  }
  .edit-form .edit-row label {
    margin: 0;
    white-space: nowrap;
    font-size: 0.8rem;
    color: var(--color-muted);
  }
  .edit-form .edit-row select {
    width: auto;
    min-width: 80px;
  }
  .edit-form .edit-actions {
    margin-top: var(--space-sm);
    display: flex;
    gap: var(--space-sm);
  }
  .edit-form .btn-save {
    background: var(--color-green);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 0.8rem;
  }
  .edit-form .btn-cancel {
    background: var(--color-surface);
    color: var(--color-muted);
    border: 1px solid var(--color-rule);
    padding: 6px 14px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 0.8rem;
  }
  .btn-check {
    background: var(--color-accent-dim);
    color: var(--color-accent);
    padding: 8px 14px;
    border: 1px solid var(--color-accent);
    font-size: 0.75rem;
  }
  .btn-check:hover { opacity: 0.85; }
  .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Check results ── */
  .check-result {
    margin-top: var(--space-sm);
    padding: var(--space-md);
    border-radius: var(--radius-md);
    font-size: 0.8125rem;
    line-height: 1.6;
  }
  .check-result--clean { background: rgba(0,200,100,0.08); border: 1px solid rgba(0,200,100,0.25); }
  .check-result--warn { background: rgba(255,180,0,0.08); border: 1px solid rgba(255,180,0,0.25); }
  .check-result--dup { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.25); }
  .check-result ul { margin: var(--space-xs) 0 0 var(--space-md); padding: 0; }
  .check-result li { margin: 2px 0; }

  /* ── Preview popover ── */
  .preview-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-card {
    background: var(--color-surface);
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-lg);
    padding: var(--space-xl);
    max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
    box-shadow: var(--card-shadow);
  }
  .preview-card .preview-close {
    float: right; background: none; border: none; color: var(--color-muted);
    font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
  }

  /* ── Feedback cards ── */
  .fb-card {
    background: var(--color-surface);
    border: 1px solid var(--color-rule);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin-bottom: var(--space-sm);
  }
  .fb-card .fb-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-sm);
  }
  .fb-card .fb-word {
    font-family: var(--font-hebrew);
    font-size: 1.1rem;
    color: var(--color-ink);
    direction: rtl;
  }
  .fb-card .fb-comment {
    color: var(--color-ink);
    font-size: 0.875rem;
    line-height: 1.5;
  }
  .fb-card .fb-meta {
    font-size: 0.75rem;
    color: var(--color-muted);
    margin-top: var(--space-xs);
  }
  .fb-toggle {
    font-family: var(--font-body);
    font-size: 0.75rem;
    border: 1px solid var(--color-rule);
    background: var(--color-paper);
    color: var(--color-muted);
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .fb-toggle:hover {
    border-color: var(--color-accent);
    color: var(--color-accent);
  }

  /* ── Spinner ── */
  .spinner {
    text-align: center;
    padding: var(--space-2xl);
    color: var(--color-muted);
    font-size: 0.875rem;
  }

  /* ── Muted (history) cards ── */
  .card-muted {
    opacity: 0.65;
    background: var(--color-surface);
    border-color: transparent;
  }
  .card-muted:hover { opacity: 0.85; }

  /* ── Words tab ── */
  .words-toolbar {
    display: flex; gap: var(--space-lg); align-items: center; flex-wrap: wrap;
    margin-bottom: var(--space-xl); padding-bottom: var(--space-md);
    border-bottom: 1px solid var(--color-rule);
  }
  .words-mode-btns { display: flex; gap: var(--space-sm); }
  .words-search { display: flex; gap: var(--space-sm); align-items: center; }
  .words-search input {
    background: var(--color-surface); border: 1px solid var(--color-rule);
    color: var(--color-ink); padding: 6px 12px; border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 0.875rem; min-width: 240px;
  }
  .words-search input:focus { outline: none; border-color: var(--color-accent); }
  .mode-btn {
    background: var(--color-surface); border: 1px solid var(--color-rule);
    color: var(--color-ink); padding: 5px 12px; border-radius: var(--radius-sm);
    cursor: pointer; font-family: var(--font-body); font-size: 0.8125rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .mode-btn:hover { background: var(--color-surface-2); }
  .mode-btn.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .mode-btn:disabled { opacity: 0.4; cursor: default; }

  .words-table-wrap { overflow-x: auto; }
  .words-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .words-table th {
    text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--color-rule);
    color: var(--color-muted); font-weight: 500; font-size: 0.8125rem;
    white-space: nowrap;
  }
  .words-table td {
    padding: 6px 10px; border-bottom: 1px solid var(--color-rule); vertical-align: middle;
  }
  .words-table tr:hover { background: var(--color-surface); }
  .he-cell { direction: rtl; text-align: right; font-family: var(--font-hebrew); }

  .issue-tag {
    display: inline-block; background: var(--color-red); color: #fff;
    border-radius: var(--radius-pill); padding: 0 6px; font-size: 0.7rem;
    margin-left: 4px; cursor: help; vertical-align: middle;
  }

  .badge-legend { display: flex; gap: var(--space-lg); margin-bottom: var(--space-md); font-size: 0.8125rem; color: var(--color-muted); }

  .badge-cell { width: 24px; text-align: center; font-size: 0.85rem; padding: 6px 2px !important; }
  .badge-cell:empty { padding: 6px 2px !important; }

  .trans-cell { word-break: break-word; white-space: normal; }

  /* Edit modal */
  .edit-card { max-width: 560px; }
  .edit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }
  .edit-grid label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 0.8125rem; color: var(--color-muted);
  }
  .edit-grid input, .edit-grid textarea {
    background: var(--color-surface); border: 1px solid var(--color-rule);
    color: var(--color-ink); padding: 6px 10px; border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 0.875rem;
  }
  .edit-grid input:focus, .edit-grid textarea:focus, .edit-grid select:focus { outline: none; border-color: var(--color-accent); }
  .edit-grid select {
    background: var(--color-surface); border: 1px solid var(--color-rule);
    color: var(--color-ink); padding: 6px 10px; border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 0.875rem; appearance: auto;
  }
  .edit-btns { display: flex; gap: var(--space-md); justify-content: flex-end; }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      bottom: 0;
      z-index: 30;
      transition: left 0.3s ease;
      width: 280px;
    }
    .sidebar.open { left: 0; }
    .burger { display: flex; }
    .content { padding: var(--space-md); max-width: none; }
    .topbar { padding: 0 var(--space-md); }
    .pw-card .head { gap: 6px; }
  }
</style>
</head>
<body class="admin-body">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">

    <span class="admin-label">Admin</span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" data-tab="pending">
      <img src="/static/icons/list-check.svg" class="nav-icon" alt="">
      Очередь
      <span class="nav-badge" id="count-pending">0</span>
    </button>
    <button class="nav-item" data-tab="approved">
      <img src="/static/icons/circle-check.svg" class="nav-icon" alt="">
      Одобрено
      <span class="nav-badge" id="count-approved">0</span>
    </button>
    <button class="nav-item" data-tab="rejected">
      <img src="/static/icons/circle-x.svg" class="nav-icon" alt="">
      Отклонено
      <span class="nav-badge" id="count-rejected">0</span>

<div class="main-area">
  <header class="topbar">
    <button class="burger" onclick="toggleSidebar()" aria-label="Меню">
      <img src="/static/icons/menu-2.svg" class="nav-icon" alt="">
    </button>
    <h1 id="topbarTitle">Очередь</h1>
  </header>
  <main class="content" id="content">
    <div class="spinner">Загрузка...</div>
  </main>
</div>

<script>
// ── POS Russian labels ──
const POS_RU = {
  noun: 'сущ.', verb: 'глаг.', adj: 'прил.', adv: 'нареч.',
  prep: 'предл.', conj: 'союз', pron: 'мест.', num: 'числ.',
  intj: 'межд.', particle: 'част.', pref: 'прист.', suff: 'суф.',
  art: 'арт.', det: 'опред.', phrase: 'фраза'
};
const GENDER_RU = { '': '—', m: 'м.р.', f: 'ж.р.' };
const NUMBER_RU = { '': '—', s: 'ед.', p: 'мн.' };
function posLabel(w) {
  const p = POS_RU[w.pos_slug] || w.pos_slug || '?';
  if (w.pos_slug === 'phrase') return p;
  const parts = [p];
  if (w.gender && w.gender !== '') parts.push(GENDER_RU[w.gender] || w.gender);
  if (w.number && w.number !== '') parts.push(NUMBER_RU[w.number] || w.number);
  return parts.join(' · ');
}

// ── Auth ──
async function checkAuth() {
  try {
    const res = await fetch('/admin/api/check');
    if (!res.ok) throw new Error('no session');
    loadAllCounts();
  } catch(e) {
    window.location.href = '/admin/login';
  }
}

async function loadAllCounts() {
  try {
    const [p, a, r, f] = await Promise.all([
      fetch('/admin/api/pending?status=pending').then(r => r.ok ? r.json() : []),
      fetch('/admin/api/pending?status=approved').then(r => r.ok ? r.json() : []),
      fetch('/admin/api/pending?status=rejected').then(r => r.ok ? r.json() : []),
      fetch('/admin/api/feedback').then(r => r.ok ? r.json() : [])
    ]);
    document.getElementById('count-pending').textContent = p.length;
    document.getElementById('count-approved').textContent = a.length;
    document.getElementById('count-rejected').textContent = r.length;
    document.getElementById('count-feedback').textContent = f.length;
  } catch(e) { /* counters stay as-is */ }
}

function logout() {
  document.cookie = 'daber_admin_session=; max-age=0; path=/';
  window.location.href = '/admin/login';
}

// ── Sidebar navigation ──
let activeTab = sessionStorage.getItem('adminTab') || 'pending';
const tabTitles = {
  pending: 'Очередь', approved: 'Одобрено', rejected: 'Отклонено',
  feedback: 'Жалобы', costs: 'Затраты', words: 'Словарь'
};

// Set initial active tab from sessionStorage
document.addEventListener('DOMContentLoaded', () => {
  const activeBtn = document.querySelector(`.nav-item[data-tab="${activeTab}"]`);
  if (activeBtn) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    activeBtn.classList.add('active');
    document.getElementById('topbarTitle').textContent = tabTitles[activeTab] || activeTab;
  }
});

document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    sessionStorage.setItem('adminTab', activeTab);
    document.getElementById('topbarTitle').textContent = tabTitles[activeTab] || activeTab;
    loadTab();
    if (window.innerWidth <= 768) closeSidebar();
  });
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

async function loadTab() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="spinner">Загрузка...</div>';
  try {
    if (activeTab === 'pending') await loadPending();
    else if (activeTab === 'approved') await loadApproved();
    else if (activeTab === 'rejected') await loadRejected();
    else if (activeTab === 'feedback') await loadFeedback();
    else if (activeTab === 'costs') await loadCosts();
    else if (activeTab === 'words') await loadWords();
  } catch(e) {
    if (e.message.includes('401')) { window.location.href = '/admin/login'; return; }
    content.innerHTML = '<div class="empty">Ошибка загрузки</div>';
  }
}

// ── Pending ──
async function loadPending() {
  const res = await fetch('/admin/api/pending?status=pending');
  if (res.status === 401) throw new Error('401');
  const words = await res.json();
  document.getElementById('count-pending').textContent = words.length;

  const content = document.getElementById('content');
  if (!words.length) {
    content.innerHTML = '<div class="empty">Нет слов на проверку</div>';
    return;
  }

  content.innerHTML = words.map(w => {
    const ex = w.examples ? (typeof w.examples === 'string' ? JSON.parse(w.examples) : w.examples) : [];
    const syn = w.synonyms ? (typeof w.synonyms === 'string' ? JSON.parse(w.synonyms) : w.synonyms) : [];
    const posLabelStr = posLabel(w);
    const src = w.source ? ' · ' + w.source : '';

    return `<div class="pw-card" id="pw-${w.id}">
      <div class="head">
        <span class="hebrew">${w.headword || ''}</span>
        <span class="nikud">${w.headword_nikud || ''}</span>
        <span class="translit">${w.translit || ''}</span>
        <span class="badge badge-pos">${posLabelStr}</span>
        ${w.already_exists ? '<span class="badge badge-duplicate">уже в словаре</span>' : ''}
      </div>
      <div class="translation">${(w.translation_enriched && w.translation_enriched.length ? w.translation_enriched.join('; ') : (w.translation_ru || '—'))}</div>
      <div class="meta">${new Date(w.created_at).toLocaleString('ru')}${src}</div>
      ${ex.length ? `<ul class="examples-list">${ex.map(e => `<li><span class="he">${e.hebrew}</span> — ${e.translation}</li>`).join('')}</ul>` : ''}
      ${syn.length ? `<div class="meta">Синонимы: ${syn.map(s => s.hebrew || s).join(', ')}</div>` : ''}
      ${w.reviewer_note ? `<div style="margin-top:8px;padding:6px 10px;background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius-sm);font-size:0.8rem;color:#856404">${w.reviewer_note}</div>` : ''}
      <div class="actions">
        <button class="btn-approve" onclick="approveWord(${w.id})">Одобрить</button>
        <button class="btn-reject" onclick="rejectWord(${w.id})">Отклонить</button>
        <button class="btn-edit" onclick="editPendingWord(${w.id})">✎</button>
        <button class="btn-check" onclick="checkWord(${w.id})" id="btn-check-${w.id}">Проверить</button>
        <button class="btn-preview" onclick="previewWord(${w.id})">👁</button>
      </div>
      <div class="check-result" id="check-${w.id}" style="display:none"></div>
      <div class="edit-form" id="edit-${w.id}">
        <label>Транслитерация</label>
        <input id="edit-translit-${w.id}" value="${(w.translit || '').replace(/"/g,'&quot;')}">
        <label>Перевод</label>
        <input id="edit-translation-${w.id}" value="${(w.translation_ru || '').replace(/"/g,'&quot;')}">
        <div class="edit-row">
          <label>Часть речи</label>
          <select id="edit-pos-${w.id}">
            <option value="">—</option>
            ${Object.entries(POS_RU).map(([slug, label]) => `<option value="${slug}" ${w.pos_slug === slug ? 'selected' : ''}>${label}</option>`).join('')}
          </select>
          <label>Род</label>
          <select id="edit-gender-${w.id}">
            ${Object.entries(GENDER_RU).map(([v,l]) => `<option value="${v}" ${(w.gender||'')===v?'selected':''}>${l}</option>`).join('')}
          </select>
          <label>Число</label>
          <select id="edit-number-${w.id}">
            ${Object.entries(NUMBER_RU).map(([v,l]) => `<option value="${v}" ${(w.number||'')===v?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <label>Примеры (каждый с новой строки: иврит — перевод)</label>
        <textarea id="edit-examples-${w.id}">${ex.map(e => e.hebrew + ' — ' + e.translation).join('\n')}</textarea>
        <label>Синонимы (каждый с новой строки: иврит — перевод)</label>
        <textarea id="edit-synonyms-${w.id}">${syn.map(s => (s.hebrew || s) + (s.translation ? ' — ' + s.translation : '')).join('\n')}</textarea>
        <label>Описание</label>
        <textarea id="edit-notes-${w.id}" style="min-height:80px">${(w.notes || '').replace(/"/g,'&quot;')}</textarea>
        <div class="edit-actions">
          <button class="btn-save" onclick="saveEdit(${w.id})">Сохранить</button>
          <button class="btn-cancel" onclick="cancelEdit(${w.id})">Отмена</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function editWord(id) {
  document.getElementById('edit-' + id).classList.toggle('open');
}

function cancelEdit(id) {
  document.getElementById('edit-' + id).classList.remove('open');
}

async function saveEdit(id) {
  const translit = document.getElementById('edit-translit-' + id).value.trim();
  const translation_ru = document.getElementById('edit-translation-' + id).value.trim();
  const pos_slug = document.getElementById('edit-pos-' + id).value;
  const gender = document.getElementById('edit-gender-' + id).value;
  const number = document.getElementById('edit-number-' + id).value;
  const examplesRaw = document.getElementById('edit-examples-' + id).value.trim();
  const synonymsRaw = document.getElementById('edit-synonyms-' + id).value.trim();
  const notes = document.getElementById('edit-notes-' + id).value.trim();

  // Parse examples
  const examples = examplesRaw ? examplesRaw.split('\n').map(line => {
    const m = line.match(/^(.+?)\s*[—–-]\s*(.+)$/);
    return m ? { hebrew: m[1].trim(), translation: m[2].trim() } : { hebrew: line.trim(), translation: '' };
  }) : [];

  // Parse synonyms
  const synonyms = synonymsRaw ? synonymsRaw.split('\n').map(line => {
    const m = line.match(/^(.+?)\s*[—–-]\s*(.+)$/);
    return m ? { hebrew: m[1].trim(), translation: m[2].trim() } : { hebrew: line.trim(), translation: '' };
  }) : [];

  const body = { translit, translation_ru, pos_slug, gender, number, examples, synonyms, notes };

  try {
    const res = await fetch('/admin/api/pending/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      alert('Ошибка: ' + (err.detail || res.status));
      return;
    }
    document.getElementById('edit-' + id).classList.remove('open');
    // Refresh card data
    const card = document.getElementById('pw-' + id);
    if (translit) card.querySelector('.translit').textContent = translit;
    if (translation_ru) card.querySelector('.translation').textContent = translation_ru;
    if (notes) {
      let notesEl = card.querySelector('.pw-notes');
      if (!notesEl) {
        notesEl = document.createElement('div');
        notesEl.className = 'pw-notes';
        card.appendChild(notesEl);
      }
      notesEl.textContent = notes;
    }
    // Update POS/gender badge
    const badge = card.querySelector('.badge-pos');
    if (badge) {
      const currentWord = { pos_slug, gender };
      badge.textContent = posLabel(currentWord) || '—';
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function approveWord(id) {
  const card = document.getElementById('pw-' + id);
  try {
    const res = await fetch('/admin/api/pending/' + id + '/approve', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      card.style.opacity = '0.5';
      card.querySelector('.actions').innerHTML = data.already_existed
        ? '<span class="badge badge-approved">уже в словаре</span>'
        : '<span class="badge badge-approved">добавлено</span>';
      setTimeout(() => { card.remove(); loadAllCounts(); }, 800);
    }
  } catch(e) { alert('Ошибка'); }
}

async function rejectWord(id) {
  const card = document.getElementById('pw-' + id);
  try {
    const res = await fetch('/admin/api/pending/' + id + '/reject?note=', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      card.style.opacity = '0.5';
      card.querySelector('.actions').innerHTML = '<span class="badge badge-rejected">отклонено</span>';
      setTimeout(() => { card.remove(); loadAllCounts(); }, 800);
    }
  } catch(e) { alert('Ошибка'); }
}

// ── Check word ──
async function checkWord(id) {
  const btn = document.getElementById('btn-check-' + id);
  const resultDiv = document.getElementById('check-' + id);
  btn.disabled = true;
  btn.textContent = 'Проверяю...';
  resultDiv.style.display = 'none';
  
  try {
    const res = await fetch('/admin/api/pending/' + id + '/check');
    const data = await res.json();
    
    let html = '';
    let cls = 'check-result--clean';
    
    if (data.duplicates.length > 0) {
      cls = 'check-result--dup';
      html += '<strong>⚠ Найдены совпадения:</strong><ul>';
      data.duplicates.forEach(d => {
        const sameMeaning = data.pending_translation && d.translation &&
          (d.translation.includes(data.pending_translation) || data.pending_translation.includes(d.translation));
        const icon = sameMeaning ? '🔴' : '🟢';
        const label = sameMeaning ? 'то же значение' : 'другое значение (омограф)';
        html += `<li>${icon} <b>${d.headword}</b> <em>(${d.pos})</em> — ${d.translation}
          <br><small style="color:var(--color-muted)">↳ pending: ${data.pending_translation || '—'} (${data.pending_pos}) — ${label}</small></li>`;
      });
      html += '</ul>';
    }
    
    if (data.warnings.length > 0) {
      if (!data.duplicates.length) cls = 'check-result--warn';
      html += '<strong>⚠ Предупреждения:</strong><ul>';
      data.warnings.forEach(w => { html += `<li>${w}</li>`; });
      html += '</ul>';
    }
    
    if (data.is_clean) {
      html = '✅ Всё чисто — слово можно одобрять.';
    }
    
    resultDiv.className = 'check-result ' + cls;
    resultDiv.innerHTML = html;
    resultDiv.style.display = 'block';
  } catch(e) {
    resultDiv.className = 'check-result check-result--dup';
    resultDiv.innerHTML = '❌ Ошибка проверки';
    resultDiv.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.textContent = 'Проверить';
}

// ── Preview ──
async function previewWord(pwId) {
  const overlay = document.createElement('div');
  overlay.className = 'preview-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const card = document.createElement('div');
  card.className = 'preview-card';
  card.innerHTML = '<div class="spinner">Загрузка...</div>';
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  try {
    const res = await fetch('/admin/api/pending/' + pwId + '/preview');
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    const posRu = POS_RU[data.pos] || data.pos || '';
    const genderRu = GENDER_RU[data.gender] || '';
    const meta = [posRu, genderRu].filter(Boolean).join(' · ');
    const examples = (data.examples || []).slice(0, 3).map(e =>
      `<li><span class="he" style="direction:rtl;display:inline">${e.hebrew}</span> — ${e.translation}</li>`
    ).join('');
    const synonyms = (data.synonyms || []).slice(0, 3).map(s =>
      `<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:var(--color-surface-2);border-radius:var(--radius-sm);font-size:0.85rem"><span style="direction:rtl;display:inline">${s.hebrew}</span> ${s.translation}</span>`
    ).join('');

    card.innerHTML = `
      <button class="preview-close" onclick="this.closest('.preview-overlay').remove()">✕</button>
      <div style="font-size:1.4rem;direction:rtl;text-align:right;margin-bottom:4px">${data.headword || ''}</div>
      <div style="font-size:1.1rem;direction:rtl;text-align:right;color:var(--color-muted);margin-bottom:4px">${data.nikud || data.headword || ''}</div>
      <div style="color:var(--color-accent);font-size:1rem;margin-bottom:4px">${data.translit || ''}</div>
      <div style="font-size:0.8rem;color:var(--color-muted);margin-bottom:12px">${meta}</div>
      <div style="font-size:1rem;margin-bottom:8px">${Array.isArray(data.translations) ? data.translations.join('; ') : (data.translations || '—')}</div>
      ${examples ? '<div style="font-size:0.85rem;color:var(--color-muted);margin-top:8px">' + examples + '</div>' : ''}
      ${synonyms ? '<div style="margin-top:8px">' + synonyms + '</div>' : ''}
      ${data.notes ? '<div style="margin-top:12px;font-size:0.8rem;color:var(--color-muted);line-height:1.5;font-style:italic;border-top:1px solid var(--color-rule);padding-top:8px">' + data.notes + '</div>' : ''}
      <div style="margin-top:8px;font-size:0.75rem;color:var(--color-muted)">Источник: ${data.source || '—'} · Статус: ${data.status}</div>`;
  } catch(e) {
    card.innerHTML = `<button class="preview-close" onclick="this.closest('.preview-overlay').remove()">✕</button>
      <div style="padding:20px;text-align:center;color:var(--color-muted)">Предпросмотр недоступен</div>`;
  }
}

async function loadCosts() {
  content.innerHTML = '<div class="spinner">Загрузка...</div>';
  const [sumRes, histRes, statusRes] = await Promise.all([
    fetch('/admin/api/costs/summary'),
    fetch('/admin/api/costs?days=14'),
    fetch('/admin/api/enrichment/status'),
  ]);
  if (!sumRes.ok) throw new Error(sumRes.status);
  const summary = await sumRes.json();
  const history = await histRes.json();
  const status = await statusRes.json();
  renderCosts(summary, history, status);
}

function renderCosts(summary, history, status) {
  const { today, month, week, pricing, today_models, month_models } = summary;
  const { paused, daily_limit, today_inserted } = status;

  const pauseLabel = paused ? 'Возобновить' : 'Пауза';
  const pauseBg = paused ? 'background:#38a169;color:#fff' : 'background:#e53e3e;color:#fff';
  const statusClass = paused ? 'badge-red' : 'badge-green';
  const statusText = paused ? 'На паузе' : 'Активен';

  var usd = function(n) { return '$' + (n || 0).toFixed(6); };
  var usd2 = function(n) { return '$' + (n || 0).toFixed(4); };
  var ils = function(n) { return '\u20AA' + ((n || 0) * 3.6).toFixed(2); };
  var num = function(n) { return (n || 0).toLocaleString(); };

  // Build days table rows
  var daysRows = '';
  (history.days || []).forEach(function(d) {
    daysRows += '<tr>' +
      '<td>' + d.day + '</td>' +
      '<td>' + d.requests + '</td>' +
      '<td>' + num(d.total_tokens) + '</td>' +
      '<td style="font-family:var(--font-mono)">' + usd(d.cost_usd) + '</td>' +
      '<td>' + (d.words_inserted || 0) + '</td>' +
      '<td>' + (d.errors > 0 ? d.errors : '\u2713') + '</td>' +
      '</tr>';
  });
  if (!daysRows) daysRows = '<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--color-muted)">\u041d\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0445</td></tr>';

  // Build model breakdown for today
  var modelBreakdown = '';
  if (today_models && today_models.length) {
    modelBreakdown = today_models.map(function(m) {
      var label = (pricing[m.model] && pricing[m.model].label) || m.model;
      return '<div style="display:flex;justify-content:space-between;font-size:0.75rem;padding:2px 0">' +
        '<span>' + label + '</span>' +
        '<span style="font-family:var(--font-mono)">' + usd2(m.cost_usd) + '</span></div>';
    }).join('');
  }

  var html = '<div style="display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-lg);flex-wrap:wrap">' +
    '<button onclick="toggleEnrichment()" style="padding:6px 16px;border:none;border-radius:var(--radius-md);font-family:var(--font-body);font-size:0.85rem;cursor:pointer;' + pauseBg + '">' + pauseLabel + '</button>' +
    '<button id="runEnrichBtn" onclick="runEnrichment()" style="padding:6px 16px;border:none;border-radius:var(--radius-md);font-family:var(--font-body);font-size:0.85rem;cursor:pointer;background:var(--color-accent);color:#fff">Собрать слова</button>' +
    ' \u0421\u0442\u0430\u0442\u0443\u0441: <span class="' + statusClass + '" style="display:inline-block;padding:2px 10px;border-radius:var(--radius-pill);font-size:0.75rem;margin-left:8px">' + statusText + '</span>' +
    '<span style="color:var(--color-muted);font-size:0.85rem;margin-left:auto">' +
    ' \u041b\u0438\u043c\u0438\u0442: <input type="number" id="dailyLimit" value="' + daily_limit + '" min="0" max="500" ' +
    'style="width:50px;padding:4px;border:1px solid var(--color-rule);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-ink);font-family:var(--font-mono);text-align:center;font-size:0.85rem" ' +
    'onchange="setDailyLimit(this.value)">' +
    ' \u0441\u043b\u043e\u0432/\u0434\u0435\u043d\u044c \u00b7 \u0421\u0435\u0433\u043e\u0434\u043d\u044f: ' + today_inserted +
    '</span></div>';

  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:var(--space-md);margin-bottom:var(--space-xl)">' +
    '<div class="pw-card" style="text-align:center">' +
      '<div style="font-size:0.75rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:0.5px">\u0421\u0435\u0433\u043e\u0434\u043d\u044f</div>' +
      '<div style="font-size:2rem;font-weight:700;font-family:var(--font-mono);margin:8px 0">' + usd(today.cost_usd) + '</div>' +
      '<div style="font-size:0.8rem;color:var(--color-muted)">' + ils(today.cost_usd) + ' \u00b7 ' + today.requests + ' \u0437\u0430\u043f\u0440\u043e\u0441\u043e\u0432</div>' +
      (modelBreakdown ? '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--color-rule)">' + modelBreakdown + '</div>' : '') +
    '</div>' +
    '<div class="pw-card" style="text-align:center">' +
      '<div style="font-size:0.75rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:0.5px">7 \u0434\u043d\u0435\u0439</div>' +
      '<div style="font-size:2rem;font-weight:700;font-family:var(--font-mono);margin:8px 0">' + usd(week.cost_usd) + '</div>' +
      '<div style="font-size:0.8rem;color:var(--color-muted)">' + ils(week.cost_usd) + '</div>' +
    '</div>' +
    '<div class="pw-card" style="text-align:center">' +
      '<div style="font-size:0.75rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:0.5px">\u041c\u0435\u0441\u044f\u0446</div>' +
      '<div style="font-size:2rem;font-weight:700;font-family:var(--font-mono);margin:8px 0">' + usd(month.cost_usd) + '</div>' +
      '<div style="font-size:0.8rem;color:var(--color-muted)">' + ils(month.cost_usd) + ' \u00b7 ' + month.requests + ' \u0437\u0430\u043f\u0440\u043e\u0441\u043e\u0432</div>' +
    '</div>' +
    '<div class="pw-card" style="text-align:center;border-left:3px solid var(--color-accent)">' +
      '<div style="font-size:0.75rem;color:var(--color-muted);text-transform:uppercase;letter-spacing:0.5px">\u0422\u043e\u043a\u0435\u043d\u043e\u0432 \u0441\u0435\u0433\u043e\u0434\u043d\u044f</div>' +
      '<div style="font-size:1.5rem;font-weight:700;font-family:var(--font-mono);margin:8px 0">' + num(today.total_tokens) + '</div>' +
      '<div style="font-size:0.75rem;color:var(--color-muted)">prompt + output</div>' +
    '</div>' +
  '</div>';

  html += '<h2 style="font-size:1rem;font-weight:600;margin-bottom:var(--space-md)">\u0418\u0441\u0442\u043e\u0440\u0438\u044f (14 \u0434\u043d\u0435\u0439)</h2>' +
    '<div style="overflow-x:auto">' +
    '<table style="width:100%;border-collapse:collapse;font-size:0.85rem">' +
    '<thead><tr style="text-align:left;border-bottom:2px solid var(--color-rule)">' +
    '<th style="padding:8px">\u0414\u0430\u0442\u0430</th>' +
    '<th style="padding:8px">\u0417\u0430\u043f\u0440\u043e\u0441\u043e\u0432</th>' +
    '<th style="padding:8px">\u0422\u043e\u043a\u0435\u043d\u043e\u0432</th>' +
    '<th style="padding:8px">\u0421\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c</th>' +
    '<th style="padding:8px">\u0421\u043b\u043e\u0432</th>' +
    '<th style="padding:8px">\u041e\u0448\u0438\u0431\u043e\u043a</th>' +
    '</tr></thead>' +
    '<tbody>' + daysRows + '</tbody>' +
    '</table></div>';

  var summary14 = history.summary;
  html += '<div style="margin-top:var(--space-md);padding:var(--space-md);background:var(--color-surface);border-radius:var(--radius-md);font-size:0.8rem;color:var(--color-muted)">' +
    '\u0417\u0430 14 \u0434\u043d\u0435\u0439: <strong>' + usd(summary14.total_cost_usd) + '</strong> (' + ils(summary14.total_cost_usd) + ') \u00b7 ' +
    num(summary14.total_tokens) + ' \u0442\u043e\u043a\u0435\u043d\u043e\u0432 \u00b7 ' + summary14.total_words_inserted + ' \u0441\u043b\u043e\u0432 \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u043e' +
    '</div>';

  content.innerHTML = html;
}

async function toggleEnrichment() {
  const res = await fetch('/admin/api/enrichment/toggle', { method: 'POST' });
  if (!res.ok) throw new Error(res.status);
  loadCosts();  // reload tab
}

async function setDailyLimit(val) {
  const limit = parseInt(val) || 30;
  await fetch('/admin/api/enrichment/limit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ limit }),
  });
}

async function runEnrichment() {
  const btn = document.getElementById('runEnrichBtn');
  btn.disabled = true;
  btn.textContent = 'Собираю...';
  btn.style.opacity = '0.7';

  try {
    const res = await fetch('/admin/api/enrichment/run', { method: 'POST' });
    if (!res.ok) {
      const err = await res.json();
      alert('Ошибка: ' + (err.detail || res.status));
      btn.disabled = false;
      btn.textContent = 'Собрать слова';
      btn.style.opacity = '1';
      return;
    }

    // Poll until done
    const poll = setInterval(async () => {
      const s = await fetch('/admin/api/enrichment/run-status');
      const state = await s.json();
      if (!state.running) {
        clearInterval(poll);
        btn.disabled = false;
        btn.textContent = 'Собрать слова';
        btn.style.opacity = '1';
        if (state.error) alert('Ошибка: ' + state.error);
        loadCosts();
      }
    }, 3000);
  } catch (e) {
    alert('Ошибка: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Собрать слова';
    btn.style.opacity = '1';
  }
}

// ── Words tab (dictionary editor) ──
let wordsMode = 'suspicious';
let wordsQuery = '';

async function loadWords() {
  const content = document.getElementById('content');

  // Render search bar + mode toggle
  content.innerHTML = `
    <div class="words-toolbar">
      <div class="words-mode-btns">
        <button class="mode-btn ${wordsMode === 'suspicious' ? 'active' : ''}" onclick="setWordsMode('suspicious')">⚠ Подозрительные</button>
        <button class="mode-btn ${wordsMode === 'all' ? 'active' : ''}" onclick="setWordsMode('all')">🔍 Все слова</button>
      </div>
      <div class="words-search" style="${wordsMode === 'all' ? '' : 'display:none'}">
        <input type="text" id="words-search-input" placeholder="Поиск по слову или транслиту…" value="${wordsQuery}"
               onkeydown="if(event.key==='Enter')searchWords()">
        <button class="mode-btn" onclick="searchWords()">Найти</button>
      </div>
    </div>
    <div id="words-results"><div class="spinner">Загрузка...</div></div>
    <div id="words-pager" style="margin-top:var(--space-lg);display:flex;gap:var(--space-md);justify-content:center"></div>
  `;

  await fetchWords(0);
}

function setWordsMode(mode) {
  wordsMode = mode;
  wordsQuery = '';
  loadWords();
}

function searchWords() {
  wordsQuery = document.getElementById('words-search-input').value.trim();
  fetchWords(0);
}

let wordsPage = 0;
// ── Helper: извлечь перевод из translation_enriched (строка|массив|объект) ──
function getTranslation(w) {
  const te = w.translation_enriched;
  if (!te) return '';
  if (typeof te === 'string') return te;
  if (Array.isArray(te)) return te[0] || '';
  if (typeof te === 'object') return te.ru || Object.values(te)[0] || '';
  return '';
}

async function fetchWords(page) {
  wordsPage = page;
  const limit = 50;
  const q = wordsMode === 'all' ? wordsQuery : '';
  const mode = wordsMode;
  const url = `/admin/api/words/search?mode=${mode}&q=${encodeURIComponent(q)}&limit=${limit}&offset=${page * limit}`;

  try {
    const res = await fetch(url);
    if (res.status === 401) throw new Error('401');
    const words = await res.json();

    const results = document.getElementById('words-results');
    if (!words.length) {
      results.innerHTML = '<div class="empty">Ничего не найдено</div>';
      document.getElementById('words-pager').innerHTML = '';
      return;
    }

  // Render legend + table
  results.innerHTML = `
    <div class="badge-legend">
      <span class="legend-item">🔴 жалобы</span>
      <span class="legend-item">⚠ проблемы (нет транслита/никуда)</span>
    </div>
    <div class="words-table-wrap"><table class="words-table">
      <thead><tr>
        <th></th><th>ID</th><th>Слово</th><th>Никуд</th><th>Транслит</th><th>Часть речи</th><th>Перевод</th><th></th>
      </tr></thead>
      <tbody>${words.map(w => {
        const pos = POS_RU[w.pos_slug] || w.pos_slug || '';

        let badge = '';
        if (w.open_feedback > 0) badge = `🔴${w.open_feedback}`;
        else {
          const issues = [];
          if (!w.translit || w.translit === '') issues.push('пусто');
          if (w.translit && w.translit.includes(' ') && !w.headword.includes(' ')) issues.push('фраза');
          if (!w.headword_nikud || w.headword_nikud === w.headword) issues.push('никуд');
          if (issues.length) badge = `⚠${issues.length}`;
        }

        const translitDisplay = w.translit || '<span style="color:var(--color-muted);font-style:italic">пусто</span>';
        const trans = getTranslation(w);
        return `<tr>
          <td class="badge-cell">${badge}</td>
          <td>${w.id}</td>
          <td class="he-cell">${w.headword}</td>
          <td class="he-cell">${w.headword_nikud || ''}</td>
          <td>${translitDisplay}</td>
          <td>${pos}</td>
          <td class="trans-cell">${trans}</td>
          <td><button class="mode-btn" onclick="editWord(${w.id})">✎</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;

    // Pager
    const pager = document.getElementById('words-pager');
    pager.innerHTML = `
      <button class="mode-btn" onclick="fetchWords(${page - 1})" ${page === 0 ? 'disabled' : ''}>← Назад</button>
      <span style="padding:6px 12px;color:var(--color-muted);font-size:0.85rem">стр. ${page + 1}</span>
      <button class="mode-btn" onclick="fetchWords(${page + 1})" ${words.length < limit ? 'disabled' : ''}>Вперёд →</button>
    `;
  } catch(e) {
    if (e.message.includes('401')) { window.location.href = '/admin/login'; return; }
    document.getElementById('words-results').innerHTML = '<div class="empty">Ошибка загрузки</div>';
  }
}

// ── Edit Pending (modal) ──
async function editPendingWord(id) {
  // Fetch pending word data
  const res = await fetch(`/admin/api/pending?id=${id}`);
  const data = await res.json();
  const w = Array.isArray(data) ? data[0] : data;
  if (!w || !w.id) { alert('Слово не найдено'); return; }

  const overlay = document.createElement('div');
  overlay.className = 'preview-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const trans = w.translation_ru || '';
  overlay.innerHTML = `<div class="preview-card edit-card" onclick="event.stopPropagation()">
    <h3 style="margin:0 0 var(--space-lg);font-family:var(--font-display)">✎ Редактировать #${w.id}</h3>
    <div class="edit-grid">
      <label>Слово (headword)<input id="ed-headword" value="${esc(w.headword)}"></label>
      <label>Никуд<input id="ed-nikud" value="${esc(w.headword_nikud)}"></label>
      <label>Транслит<input id="ed-translit" value="${esc(w.translit)}"></label>
      <label>Часть речи
        <select id="ed-pos">${[
          {v:'',l:'—'}, ...Object.entries(POS_RU).map(([v,l]) => ({v,l}))
        ].map(o =>
          `<option value="${o.v}" ${(w.pos_slug||'')===o.v?'selected':''}>${o.l}</option>`
        ).join('')}</select>
      </label>
      <label>Род
        <select id="ed-gender">${Object.entries(GENDER_RU).map(([v,l]) =>
          `<option value="${v}" ${(w.gender||'')===v?'selected':''}>${l}</option>`
        ).join('')}</select>
      </label>
      <label>Число
        <select id="ed-number">${Object.entries(NUMBER_RU).map(([v,l]) =>
          `<option value="${v}" ${(w.number||'')===v?'selected':''}>${l}</option>`
        ).join('')}</select>
      </label>
      <label style="grid-column:span 2">Основной перевод<input id="ed-translation" value="${esc(trans)}"></label>
      <label style="grid-column:span 2">Все варианты<input id="ed-enriched" value="${esc((w.translation_enriched||[]).join('; '))}" style="color:var(--color-muted)"></label>
      <label style="grid-column:span 2">Заметки<textarea id="ed-notes" rows="3">${esc(w.notes||'')}</textarea></label>
    </div>
    <div class="edit-btns">
      <button class="mode-btn" onclick="savePendingEdit(${id})" style="background:var(--color-accent);color:#fff">Сохранить</button>
      <button class="mode-btn" onclick="this.closest('.preview-overlay').remove()">Отмена</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function savePendingEdit(id) {
  const enrichedRaw = document.getElementById('ed-enriched').value.trim();
  const translation_enriched = enrichedRaw ? enrichedRaw.split(';').map(s => s.trim()).filter(Boolean) : [];
  const body = {
    headword: document.getElementById('ed-headword').value.trim(),
    headword_nikud: document.getElementById('ed-nikud').value.trim(),
    translit: document.getElementById('ed-translit').value.trim(),
    pos_slug: document.getElementById('ed-pos').value,
    gender: document.getElementById('ed-gender').value,
    number: document.getElementById('ed-number').value,
    translation_ru: document.getElementById('ed-translation').value.trim(),
    translation_enriched: translation_enriched,
    notes: document.getElementById('ed-notes').value.trim(),
  };

  try {
    const res = await fetch(`/admin/api/pending/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Save failed'); }
    document.querySelector('.preview-overlay').remove();
    loadPending();  // refresh
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

// ── Edit Modal (live words) ──

  // Fetch word data
  const res = await fetch(`/api/word/_?id=${id}`);
  const w = await res.json();

  const overlay = document.createElement('div');
  overlay.className = 'preview-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const trans = getTranslation(w);
  overlay.innerHTML = `<div class="preview-card edit-card" onclick="event.stopPropagation()">
    <h3 style="margin:0 0 var(--space-lg);font-family:var(--font-display)">✎ Редактировать #${w.id}</h3>
    <div class="edit-grid">
      <label>Слово (headword)<input id="ed-headword" value="${esc(w.headword)}"></label>
      <label>Никуд<input id="ed-nikud" value="${esc(w.headword_nikud)}"></label>
      <label>Транслит<input id="ed-translit" value="${esc(w.translit)}"></label>
      <label>Часть речи
        <select id="ed-pos">${[
          {v:'',l:'—'}, ...Object.entries(POS_RU).map(([v,l]) => ({v,l}))
        ].map(o =>
          `<option value="${o.v}" ${(w.pos_slug||'')===o.v?'selected':''}>${o.l}</option>`
        ).join('')}</select>
      </label>
      <label>Род
        <select id="ed-gender">${Object.entries(GENDER_RU).map(([v,l]) =>
          `<option value="${v}" ${(w.gender||'')===v?'selected':''}>${l}</option>`
        ).join('')}</select>
      </label>
      <label>Число
        <select id="ed-number">${Object.entries(NUMBER_RU).map(([v,l]) =>
          `<option value="${v}" ${(w.number||'')===v?'selected':''}>${l}</option>`
        ).join('')}</select>
      </label>
      <label style="grid-column:span 2">Перевод<input id="ed-translation" value="${esc(trans)}"></label>
      <label style="grid-column:span 2">Заметки<textarea id="ed-notes" rows="3">${esc(w.notes)}</textarea></label>
    </div>
    <div class="edit-btns">
      <button class="mode-btn" onclick="saveWord(${id})" style="background:var(--color-accent);color:#fff">Сохранить</button>
      <button class="mode-btn" onclick="deleteWordAdmin(${id})" style="color:var(--color-red)">Удалить</button>
      <button class="mode-btn" onclick="this.closest('.preview-overlay').remove()">Отмена</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function saveWord(id) {
  const body = {
    headword: document.getElementById('ed-headword').value.trim(),
    headword_nikud: document.getElementById('ed-nikud').value.trim(),
    translit: document.getElementById('ed-translit').value.trim(),
    pos_slug: document.getElementById('ed-pos').value,
    gender: document.getElementById('ed-gender').value,
    number: document.getElementById('ed-number').value,
    translation_ru: document.getElementById('ed-translation').value.trim(),
    notes: document.getElementById('ed-notes').value.trim(),
  };

  try {
    const res = await fetch(`/admin/api/word/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Save failed'); }
    document.querySelector('.preview-overlay').remove();
    fetchWords(wordsPage);  // refresh current page
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

async function deleteWordAdmin(id) {
  if (!confirm('Точно удалить слово #' + id + '? Каскадно удалятся формы, фразы, примеры, синонимы.')) return;
  try {
    const res = await fetch(`/api/admin/word/${id}?type=word`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    document.querySelector('.preview-overlay').remove();
    fetchWords(wordsPage);
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

checkAuth().then(() => loadTab());
