<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daber Banner v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #0a0a0f;
  }

  .banner {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: #0066CC;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  /* Subtle depth */
  .bg-shine {
    position: absolute;
    top: -200px;
    left: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .bg-glow {
    position: absolute;
    bottom: -300px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Minimal top brand */
  .brand {
    position: absolute;
    top: 50px;
    left: 60px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 3;
  }

  .brand-logo {
    height: 28px;
    opacity: 0.5;
  }
  .brand-logo svg { height: 100%; width: auto; fill: rgba(255,255,255,0.5); }

  .brand-divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.15);
  }

  .brand-name {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 80px;
  }

  /* Eyebrow */
  .eyebrow {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Main headline */
  .headline {
    font-size: 88px;
    font-weight: 700;
    color: white;
    line-height: 1.05;
    letter-spacing: -2px;
    max-width: 80%;
  }

  .headline-sub {
    font-size: 88px;
    font-weight: 200;
    color: white;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-top: 8px;
  }

  /* Divider line */
  .divider-line {
    width: 50px;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 30px 0;
  }

  /* Description */
  .description {
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    max-width: 65%;
  }

  .description strong {
    font-weight: 600;
    color: white;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 30px;
    margin-top: 40px;
  }

  .stat {
    text-align: left;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: white;
    line-height: 1;
  }
  .stat-label {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,0.12);
  }

  /* Bottom URL */
  .bottom-url {
    position: absolute;
    bottom: 50px;
    left: 80px;
    font-size: 15px;
    font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    z-index: 3;
  }

  .bottom-url::after {
    content: ' →';
    color: rgba(255,255,255,0.2);
  }

  /* CTA badge */
  .cta-badge {
    position: absolute;
    bottom: 44px;
    right: 80px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .cta-badge .arrow-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: rgba(255,255,255,0.4);
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .banner { width: 100vw; height: 100vw; }
    .content { padding: 6vw; }
    .headline, .headline-sub { font-size: 8vw; }
    .description { font-size: 2vw; max-width: 80%; }
    .stat-value { font-size: 2.6vw; }
    .stat-label { font-size: 1.2vw; }
    .brand { top: 4vw; left: 5vw; }
    .bottom-url { left: 6vw; bottom: 4vw; font-size: 1.4vw; }
    .cta-badge { right: 6vw; bottom: 3.5vw; font-size: 1.2vw; }
    .eyebrow { font-size: 1.5vw; }
  }
</style>
</head>

    <span class="brand-divider"></span>
    <span class="brand-name">словарь иврита</span>
  </div>

  <div class="content">
    <div class="eyebrow">бесплатно</div>

    <div class="headline">Понимать иврит</div>
    <div class="headline-sub">теперь проще</div>

    <div class="divider-line"></div>

    <div class="description">
      8 000 слов, 4 600 глаголов, транскрипция и перевод.<br>
      Словарь, который <strong>пополняется каждый день</strong>.
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">8 000+</div>
        <div class="stat-label">слов</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">4 600+</div>
        <div class="stat-label">глаголов</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">Free</div>
        <div class="stat-label">навсегда</div>
      </div>
    </div>
  </div>

  <div class="bottom-url">slovar.daber.me</div>
  <div class="cta-badge">
    <span>попробовать</span>
    <div class="arrow-circle">→</div>
  </div>
</div>

</html>
