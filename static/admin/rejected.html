<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daber Dict · Отклонено</title>
<link rel="stylesheet" href="/static/fonts.css?v=1">
<link rel="stylesheet" href="/static/design-system.css">
<link rel="stylesheet" href="/admin/static/_admin.css?v=4">
</head>
<body class="admin-body">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" style="display:flex;align-items:center;text-decoration:none"><span class="logo-img"></span><img src="/daber-logo.svg" class="logo-fallback" alt="Daber"></a>
    <span class="admin-label">Admin</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/admin/pending" class="nav-item"><img src="/static/icons/list-check.svg" class="nav-icon" alt="">Очередь<span class="nav-badge" id="count-pending">0</span></a>
    <a href="/admin/approved" class="nav-item"><img src="/static/icons/circle-check.svg" class="nav-icon" alt="">Одобрено<span class="nav-badge" id="count-approved">0</span></a>
    <a href="/admin/rejected" class="nav-item active"><img src="/static/icons/circle-x.svg" class="nav-icon" alt="">Отклонено<span class="nav-badge" id="count-rejected">0</span></a>
    <a href="/admin/feedback" class="nav-item"><img src="/static/icons/message-report.svg" class="nav-icon" alt="">Жалобы<span class="nav-badge" id="count-feedback">0</span></a>
    <a href="/admin/words" class="nav-item"><img src="/static/icons/books.svg" class="nav-icon" alt="">Словарь</a>
    <a href="/admin/costs" class="nav-item"><img src="/static/icons/coins.svg" class="nav-icon" alt="">Затраты</a>
    <a href="/admin/facts" class="nav-item"><img src="/static/icons/dice-6.svg" class="nav-icon" alt="">Факты</a>
  </nav>
  <div class="sidebar-footer">
    <button class="nav-item logout-item" onclick="logout()"><img src="/static/icons/logout.svg" class="nav-icon" alt="">Выйти</button>
  </div>
</aside>

<div class="main-area">
  <header class="topbar">
    <button class="burger" onclick="toggleSidebar()"><img src="/static/icons/menu-2.svg" class="nav-icon" alt=""></button>
    <h1>Отклонено</h1>
  </header>
  <main class="content" id="content"><div class="spinner">Загрузка...</div></main>
</div>

<script src="/admin/static/_core.js"></script>
<script>
async function loadRejected() {
  const res = await fetch('/admin/api/pending?status=rejected');
  if (res.status === 401) { window.location.href = '/admin/login'; return; }
  const words = await res.json();
  const content = document.getElementById('content');
  if (!words.length) { content.innerHTML = '<div class="empty">Нет отклонённых слов</div>'; return; }
  content.innerHTML = words.map(w => {
    const posLabelStr = posLabel(w);
    return `<div class="pw-card card-muted">
    <div class="head">
      <span class="hebrew">${w.headword || ''}</span>
      <span class="nikud">${w.headword_nikud || ''}</span>
      <span class="translit">${w.translit || ''}</span>
      <span class="badge badge-pos">${posLabelStr}</span>
      <span class="badge badge-rejected"><img src="/static/icons/circle-x.svg" style="width:14px;height:14px;vertical-align:-2px;filter:brightness(0) saturate(0)" alt=""></span>
    </div>
    <div class="translation">${w.translation_ru || '—'}</div>
    <div class="meta">${new Date(w.reviewed_at || w.created_at).toLocaleString('ru')}${w.reviewer_note ? ' · ' + w.reviewer_note : ''}${w.source ? ' · ' + w.source : ''}</div>
  </div>`;
  }).join('');
}
function onPageLoad() { loadRejected(); }
</script>
</body>
</html>
