<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интересные факты об иврите — דבר</title>
<meta property="og:title" content="Интересные факты об иврите">
<meta property="og:description" content="Удивительные истории, этимология и факты о языке иврит">
<meta property="og:type" content="website">
<link rel="stylesheet" href="/static/fonts.css?v=1">
<link rel="stylesheet" href="/static/design-system.css?v=2">
<link rel="stylesheet" href="/static/components.css?v=1">
<style>
/* ── Facts Page ── */
.facts-header {
  padding: 4rem 0 var(--space-xl);
  text-align: center;
}
.facts-header h1 {
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: var(--space-sm);
}
.facts-header h1 span {
  background: linear-gradient(135deg, var(--color-accent), var(--color-accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.facts-header p {
  color: var(--color-muted);
  font-size: 1.1rem;
  max-width: 500px;
  margin: 0 auto;
}

.fact-feed {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
  padding-bottom: var(--space-2xl);
}

.fact-card {
  background: var(--color-surface);
  border: 1px solid var(--color-rule);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  transition: border-color 0.2s, transform 0.2s;
  text-decoration: none;
  color: var(--color-ink);
  display: block;
}
.fact-card:hover {
  border-color: var(--color-accent);
  transform: translateY(-2px);
}

.fact-card__type {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-sm);
}
.fact-type-did_you_know { color: var(--color-accent); }
.fact-type-story { color: var(--color-green); }
.fact-type-etymology { color: var(--color-orange); }
.fact-type-comparison { color: oklch(58% 0.22 285); }

.fact-card__title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: var(--space-sm);
  line-height: 1.3;
}

.fact-card__body {
  font-size: 0.95rem;
  color: var(--color-muted);
  line-height: 1.65;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.fact-card__meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--space-md);
  font-size: 0.78rem;
  color: var(--color-neutral);
}
.fact-card__source {
  color: var(--color-legal);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.fact-card__source:hover { color: var(--color-accent); }

.icon--mask {
  display: inline-block;
  width: 1.1em;
  height: 1.1em;
  vertical-align: -0.2em;
  background-color: currentColor;
  mask-size: contain;
  mask-repeat: no-repeat;
  mask-position: center;
  -webkit-mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-position: center;
}
.icon--bulb { mask-image: url('/static/icons/bulb.svg'); -webkit-mask-image: url('/static/icons/bulb.svg'); }
.icon--book { mask-image: url('/static/icons/book.svg'); -webkit-mask-image: url('/static/icons/book.svg'); }
.icon--search { mask-image: url('/static/icons/search.svg'); -webkit-mask-image: url('/static/icons/search.svg'); }
.icon--scale { mask-image: url('/static/icons/scale.svg'); -webkit-mask-image: url('/static/icons/scale.svg'); }

.pagination {
  display: flex;
  justify-content: center;
  gap: var(--space-sm);
  margin-top: var(--space-xl);
  padding-bottom: var(--space-xl);
}
.pagination button {
  padding: 0.5rem 1rem;
  border: 1px solid var(--color-rule);
  border-radius: var(--radius-md);
  background: var(--color-surface);
  color: var(--color-ink);
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.pagination button:hover:not(:disabled) {
  border-color: var(--color-accent);
  color: var(--color-accent);
}
.pagination button:disabled {
  opacity: 0.3;
  cursor: default;
}
.pagination .page-current {
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: #fff;
}

.empty-state {
  text-align: center;
  padding: 4rem 0;
  color: var(--color-muted);
  font-size: 1.1rem;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .facts-header { padding: 2.5rem 0 var(--space-md); }
  .facts-header h1 { font-size: 1.5rem; }
  .fact-card { padding: var(--space-md); }
  .fact-card__title { font-size: 1.1rem; }
}
</style>
</head>
<body>

<main class="page-main">
  <section class="facts-header">
    <div class="container">
      <h1>Интересные факты <span>об иврите</span></h1>
      <p>Удивительные истории, этимология и малоизвестные факты о древнем языке, который возродился</p>
    </div>
  </section>

  <div class="container">
    <div class="fact-feed" id="feed"></div>
    <div class="empty-state" id="empty" style="display:none">Пока нет опубликованных фактов. Загляните позже!</div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer__links">
      <a href="/">словарь</a>
      <a href="/terms.html">условия использования</a>
      <a href="/privacy.html">конфиденциальность</a>
    </div>
  </div>
</footer>

<script>
const TYPE_LABELS = {
  did_you_know: 'А вы знали?',
  story: 'История',
  etymology: 'Этимология',
  comparison: 'Сравнение',
};
const TYPE_ICONS = {
  did_you_know: '<span class="icon--mask icon--bulb"></span>',
  story: '<span class="icon--mask icon--book"></span>',
  etymology: '<span class="icon--mask icon--search"></span>',
  comparison: '<span class="icon--mask icon--scale"></span>',
};

let currentPage = 0;
let totalPages = 1;
let isLoading = false;

async function loadFacts(reset = false) {
  if (isLoading) return;
  if (!reset && currentPage >= totalPages) return;
  if (reset) { currentPage = 0; document.getElementById('feed').innerHTML = ''; }

  isLoading = true;
  const page = currentPage + 1;
  try {
    const res = await fetch(`/api/facts?page=${page}&limit=10`);
    const data = await res.json();
    renderFacts(data, reset);
    currentPage = data.page;
    totalPages = data.pages;
  } catch (e) {
    console.error('Failed to load facts:', e);
    if (reset) document.getElementById('empty').style.display = 'block';
  }
  isLoading = false;
}

function renderFacts(data, reset) {
  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');

  if (reset && !data.facts.length) {
    feed.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const html = data.facts.map(f => {
    const date = f.published_at ? new Date(f.published_at).toLocaleDateString('ru') : '';
    return `
      <a href="/facts/${f.id}" class="fact-card">
        <div class="fact-card__type fact-type-${f.fact_type}">${TYPE_ICONS[f.fact_type] || ''} ${TYPE_LABELS[f.fact_type] || f.fact_type}</div>
        <div class="fact-card__title">${esc(f.title)}</div>
        <div class="fact-card__body">${esc(f.fact_body)}</div>
        <div class="fact-card__meta">
          <span>${date}</span>
          ${f.source_url ? `<span class="fact-card__source" onclick="event.preventDefault();event.stopPropagation();window.open('${escAttr(f.source_url)}','_blank')">источник</span>` : ''}
        </div>
      </a>`;
  }).join('');
  feed.insertAdjacentHTML('beforeend', html);
}

// Lazy load via IntersectionObserver
const sentinel = document.createElement('div');
sentinel.id = 'scrollSentinel';
sentinel.style.height = '1px';
document.querySelector('.container').appendChild(sentinel);

const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && !isLoading && currentPage < totalPages) {
    loadFacts();
  }
}, { rootMargin: '300px' });
observer.observe(sentinel);

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

loadFacts(true);
</script>
</body>
</html>
